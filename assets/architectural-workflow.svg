<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">API Audit Logging architectural workflow</title>
  <desc id="desc">Architecture diagram showing inbound capture, outbound client capture, core audit processing, storage sinks, and internal search.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .app { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; }
      .zone { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
      .core { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; }
      .sink { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .client { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 10; }
      .text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #1f2937; font-size: 24px; }
      .small { font-size: 18px; fill: #475569; }
      .label { font-size: 20px; font-weight: 600; fill: #334155; }
      .title { font-size: 30px; font-weight: 700; fill: #111827; }
      .muted { font-size: 16px; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .blue-arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .dash { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="900"/>

  <text x="700" y="54" text-anchor="middle" class="title">API Audit Logging Flow</text>
  <text x="700" y="84" text-anchor="middle" class="muted">Inbound and outbound capture with masking, correlation, pluggable sinks, and internal lookup</text>

  <rect x="55" y="125" width="1290" height="690" class="app" rx="18"/>
  <text x="700" y="160" text-anchor="middle" class="label">Spring Boot Application</text>

  <rect x="95" y="205" width="365" height="250" class="zone" rx="14"/>
  <text x="277" y="238" text-anchor="middle" class="label">Inbound Capture</text>
  <rect x="140" y="270" width="275" height="60" class="box"/>
  <text x="277" y="308" text-anchor="middle" class="text">Spring MVC Controller</text>
  <rect x="140" y="360" width="275" height="62" class="box"/>
  <text x="277" y="386" text-anchor="middle" class="text">@AuditLog</text>
  <text x="277" y="410" text-anchor="middle" class="small">request, response, errors</text>

  <rect x="520" y="205" width="360" height="250" class="zone" rx="14"/>
  <text x="700" y="238" text-anchor="middle" class="label">Outbound Capture</text>
  <rect x="560" y="270" width="280" height="62" class="box"/>
  <text x="700" y="296" text-anchor="middle" class="text">Client Integrations</text>
  <text x="700" y="320" text-anchor="middle" class="small">Feign, RestTemplate, RestClient</text>
  <rect x="560" y="360" width="280" height="62" class="box"/>
  <text x="700" y="386" text-anchor="middle" class="text">Reactive and Interfaces</text>
  <text x="700" y="410" text-anchor="middle" class="small">WebClient, HTTP interfaces</text>

  <rect x="940" y="205" width="330" height="250" class="core" rx="14"/>
  <text x="1105" y="238" text-anchor="middle" class="label">Audit Core</text>
  <rect x="985" y="270" width="240" height="62" class="box"/>
  <text x="1105" y="296" text-anchor="middle" class="text">Event Publisher</text>
  <text x="1105" y="320" text-anchor="middle" class="small">async listener pipeline</text>
  <rect x="985" y="360" width="240" height="62" class="box"/>
  <text x="1105" y="386" text-anchor="middle" class="text">Masking and Metadata</text>
  <text x="1105" y="410" text-anchor="middle" class="small">headers, bodies, caller data</text>

  <rect x="390" y="525" width="620" height="190" class="sink" rx="14"/>
  <text x="700" y="558" text-anchor="middle" class="label">Storage and Streaming Sinks</text>
  <rect x="425" y="590" width="125" height="70" class="box"/>
  <text x="488" y="632" text-anchor="middle" class="text">JPA</text>
  <rect x="575" y="590" width="125" height="70" class="box"/>
  <text x="638" y="632" text-anchor="middle" class="text">JDBC</text>
  <rect x="725" y="590" width="125" height="70" class="box"/>
  <text x="788" y="632" text-anchor="middle" class="text">Memory</text>
  <rect x="875" y="590" width="100" height="70" class="box"/>
  <text x="925" y="632" text-anchor="middle" class="text">Kafka</text>
  <text x="700" y="690" text-anchor="middle" class="small">Searchable stores power /internal/audit-logs; Kafka feeds SIEM or data platforms</text>

  <rect x="95" y="535" width="210" height="95" class="client"/>
  <text x="200" y="576" text-anchor="middle" class="text">External Client</text>
  <text x="200" y="604" text-anchor="middle" class="small">incoming API call</text>

  <rect x="1095" y="535" width="215" height="95" class="client"/>
  <text x="1202" y="576" text-anchor="middle" class="text">Downstream API</text>
  <text x="1202" y="604" text-anchor="middle" class="small">outgoing call</text>

  <rect x="1045" y="675" width="265" height="82" class="client"/>
  <text x="1178" y="708" text-anchor="middle" class="text">Internal Search</text>
  <text x="1178" y="733" text-anchor="middle" class="small">secured audit lookup endpoint</text>

  <path d="M200 535 C200 470, 220 435, 277 422" class="arrow"/>
  <text x="120" y="490" class="small">HTTP request</text>

  <path d="M415 391 C470 391, 505 391, 560 391" class="blue-arrow"/>
  <text x="468" y="372" text-anchor="middle" class="small">business flow</text>

  <path d="M840 391 C890 391, 930 360, 985 320" class="arrow dash"/>
  <path d="M415 391 C645 500, 900 440, 985 320" class="arrow dash"/>
  <text x="665" y="485" text-anchor="middle" class="small">audit events</text>

  <path d="M840 300 C945 300, 965 300, 985 300" class="arrow dash"/>
  <text x="910" y="283" text-anchor="middle" class="small">metadata</text>

  <path d="M840 391 C930 425, 1060 500, 1095 565" class="blue-arrow"/>
  <text x="990" y="508" text-anchor="middle" class="small">X-Correlation-ID</text>

  <path d="M1105 422 C1105 520, 990 590, 975 625" class="arrow"/>
  <text x="1115" y="506" class="small">masked record</text>

  <path d="M975 625 C1050 655, 1105 680, 1178 675" class="arrow dash"/>
  <text x="1088" y="656" text-anchor="middle" class="small">query by filters</text>

  <text x="700" y="830" text-anchor="middle" class="muted">Storage is selected by module and configuration: starter defaults to JPA; direct storage modules require explicit opt-in.</text>
</svg>
