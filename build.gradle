plugins {
    id 'java-library'
    id 'jacoco'
    id 'org.springframework.boot' version '3.4.1'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.diffplug.spotless' version '7.0.2'
    id 'org.sonarqube' version '6.0.1.5171'
    id 'maven-publish'
}

group = 'com.api.audit'
version = '1.1.0'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    api 'org.springframework.boot:spring-boot-starter-web'
    api 'org.springframework.boot:spring-boot-starter-data-jpa'
    api 'org.springframework.cloud:spring-cloud-starter-openfeign:4.2.0'

    // 'implementation' scope: internal only, NOT exposed to consumers.
    implementation 'org.flywaydb:flyway-core'

    // Optional: present only if host already uses Micrometer/Actuator.
    // Never forced onto the host's classpath.
    compileOnly 'io.micrometer:micrometer-core'

    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'io.micrometer:micrometer-core'
}

bootJar {
    enabled = false
}

jar {
    enabled = true
    archiveClassifier.set('')
}

spotless {
    java {
        googleJavaFormat()
        importOrder()
        removeUnusedImports()
        endWithNewline()
    }
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('compileJava') {
    dependsOn 'spotlessApply'
}

// POM metadata for GitHub Packages publishing
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'API Audit Logging Library'
                description = 'Non-invasive, annotation-driven API audit logging for Spring Boot 3.4+ microservices'
                url = 'https://github.com/puneet-swarup/api-audit-logging'
                licenses {
                    license {
                        name = 'Apache License 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0'
                    }
                }
                developers {
                    developer {
                        id = 'puneet-swarup'
                        name = 'Puneet Swarup'
                        url = 'https://www.linkedin.com/in/puneet-swarup/'
                    }
                }
                scm {
                    url = 'https://github.com/puneet-swarup/api-audit-logging'
                    connection = 'scm:git:git://github.com/puneet-swarup/api-audit-logging.git'
                }
            }
        }
    }
    repositories {
        maven {
            name = 'GitHubPackages'
            url = uri('https://maven.pkg.github.com/puneet-swarup/api-audit-logging')
            credentials {
                username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                password = project.findProperty('gpr.token') ?: System.getenv('GITHUB_TOKEN')
            }
        }
    }
}