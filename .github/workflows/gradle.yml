name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
  # 1. Existing Build (Builds your library)
    - name: Build with Gradle
      run: ./gradlew build

  # 2. NEW: Publish to the runner's local storage
    - name: Publish to Maven Local
      run: ./gradlew publishToMavenLocal

  # 3. NEW: Run the sample app
    - name: Build and Test Samples
      run: |
        cd samples/api-audit-demo-app
        chmod +x gradlew
        ./gradlew build