name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
  # 1. Build the full multi-module project.
    - name: Build with Gradle
      run: ./gradlew build

  # 2. Validate the Maven/Gradle publication metadata.
    - name: Publish to Maven Local
      run: ./gradlew publishToMavenLocal

  # 3. Keep the demo application build visible as a reference integration.
    - name: Build and Test Demo App
      run: ./gradlew :api-audit-demo-app:build
