spring:
  application:
    name: api-audit-demo-app

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # H2 Web Console Access (http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate Settings
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true # Helpful for debugging your library's inserts

    # Example custom configuration for your library

audit:
  logging:
    enabled: true
    feign-error:
      enabled: false
    cleanup:
      enabled: false
      days: 15
